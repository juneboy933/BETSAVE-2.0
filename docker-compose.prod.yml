services:
  mongo:
    image: mongo:7
    container_name: betsave-mongo
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all", "--replSet", "rs0", "--auth"]
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host localhost:27017 -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)\""
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  mongo-init:
    image: mongo:7
    container_name: betsave-mongo-init
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
    command:
      [
        "sh",
        "-c",
        "mongosh --host mongo:27017 -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }\""
      ]

  redis:
    image: redis:7-alpine
    container_name: betsave-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: betsave-backend-api
    restart: unless-stopped
    environment: &backend_env
      NODE_ENV: production
      PORT: 5000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/betsave?authSource=admin&replicaSet=rs0
      MONGO_REQUIRE_TRANSACTIONS: "true"
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      SAVINGS_PERCENTAGE: ${SAVINGS_PERCENTAGE:-0.1}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      USER_JWT_SECRET: ${USER_JWT_SECRET:?USER_JWT_SECRET is required}
      USER_JWT_EXPIRATION: ${USER_JWT_EXPIRATION:-7d}
      PARTNER_JWT_SECRET: ${PARTNER_JWT_SECRET:?PARTNER_JWT_SECRET is required}
      PARTNER_SECRET_ENCRYPTION_KEY: ${PARTNER_SECRET_ENCRYPTION_KEY:?PARTNER_SECRET_ENCRYPTION_KEY is required}
      PARTNER_OPERATING_MODE: ${PARTNER_OPERATING_MODE:-demo}
      PARTNER_INTEGRATION_TOKEN: ${PARTNER_INTEGRATION_TOKEN:-}
      PAYMENT_CALLBACK_TOKEN: ${PAYMENT_CALLBACK_TOKEN:?PAYMENT_CALLBACK_TOKEN is required}
      PARTNER_WEBHOOK_TIMEOUT_MS: ${PARTNER_WEBHOOK_TIMEOUT_MS:-5000}
      PAYMENTS_ENABLE_DEPOSITS: ${PAYMENTS_ENABLE_DEPOSITS:-true}
      PAYMENTS_ENABLE_WITHDRAWALS: ${PAYMENTS_ENABLE_WITHDRAWALS:-true}
      WITHDRAWAL_MIN_KES: ${WITHDRAWAL_MIN_KES:-100}
      DARAJA_ENV: ${DARAJA_ENV:-sandbox}
      DARAJA_HTTP_TIMEOUT_MS: ${DARAJA_HTTP_TIMEOUT_MS:-15000}
      DARAJA_CONSUMER_KEY: ${DARAJA_CONSUMER_KEY:-}
      DARAJA_CONSUMER_SECRET: ${DARAJA_CONSUMER_SECRET:-}
      DARAJA_SHORTCODE: ${DARAJA_SHORTCODE:-}
      DARAJA_PASSKEY: ${DARAJA_PASSKEY:-}
      DARAJA_STK_TRANSACTION_TYPE: ${DARAJA_STK_TRANSACTION_TYPE:-CustomerPayBillOnline}
      DARAJA_STK_CALLBACK_URL: ${DARAJA_STK_CALLBACK_URL:-}
      DARAJA_B2C_SHORTCODE: ${DARAJA_B2C_SHORTCODE:-}
      DARAJA_B2C_INITIATOR_NAME: ${DARAJA_B2C_INITIATOR_NAME:-}
      DARAJA_B2C_SECURITY_CREDENTIAL: ${DARAJA_B2C_SECURITY_CREDENTIAL:-}
      DARAJA_B2C_COMMAND_ID: ${DARAJA_B2C_COMMAND_ID:-BusinessPayment}
      DARAJA_B2C_TIMEOUT_URL: ${DARAJA_B2C_TIMEOUT_URL:-}
      DARAJA_B2C_RESULT_URL: ${DARAJA_B2C_RESULT_URL:-}
      BANK_API_URL: ${BANK_API_URL:-}
      BANK_API_KEY: ${BANK_API_KEY:-}
      BANK_SETTLEMENT_ACCOUNT: ${BANK_SETTLEMENT_ACCOUNT:-}
      OPERATIONAL_RECOVERY_INTERVAL_MS: ${OPERATIONAL_RECOVERY_INTERVAL_MS:-60000}
      RECOVERY_BATCH_SIZE: ${RECOVERY_BATCH_SIZE:-100}
      STALE_PROCESSING_EVENT_MS: ${STALE_PROCESSING_EVENT_MS:-600000}
      STALE_INITIATED_PAYMENT_MS: ${STALE_INITIATED_PAYMENT_MS:-300000}
      STALE_PENDING_PAYMENT_MS: ${STALE_PENDING_PAYMENT_MS:-1800000}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"

  event-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: betsave-event-worker
    restart: unless-stopped
    command: npm run worker:event
    environment: *backend_env
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  webhook-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: betsave-webhook-worker
    restart: unless-stopped
    command: npm run worker:webhook
    environment: *backend_env
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  recovery-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: betsave-recovery-worker
    restart: unless-stopped
    command: npm run worker:recovery
    environment: *backend_env
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  partner-frontend:
    build:
      context: ./PartnerFrontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    container_name: betsave-partner-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    depends_on:
      - backend-api
    ports:
      - "5181:5181"

  admin-frontend:
    build:
      context: ./AdminFrontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    container_name: betsave-admin-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    depends_on:
      - backend-api
    ports:
      - "5182:5182"

volumes:
  mongo_data:
